<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNTY WE - SEWING & HANDMADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { dark: '#4A90E2', main: '#72AEE6', light: '#F0F7FF', text: '#2C3E50', subtext: '#5D6D7E' }
                    },
                    boxShadow: {
                        'app': '0 -10px 40px -15px rgba(114, 174, 230, 0.2), 0 10px 40px -15px rgba(114, 174, 230, 0.2)',
                        'nav': '0 -5px 25px -5px rgba(114, 174, 230, 0.3)',
                        'card': '0 15px 35px -5px rgba(114, 174, 230, 0.15)',
                        'glow': '0 0 15px rgba(114, 174, 230, 0.4)',
                        'logo': '0 0 0 6px white, 0 10px 25px rgba(74, 144, 226, 0.25)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FBFF; -webkit-tap-highlight-color: transparent; overflow-x: hidden; font-family: 'Prompt', sans-serif; }
        .app-container { max-width: 430px; margin: 0 auto; min-height: 100vh; background-color: #F0F7FF; position: relative; box-shadow: 0 0 40px rgba(114, 174, 230, 0.15); }
        .gradient-bg { background: linear-gradient(135deg, #4A90E2 0%, #72AEE6 100%); }
        .page { display: none; animation: pageIn 0.5s ease-out forwards; padding-bottom: 120px; }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-brand-text">

    <div id="gallery-popup" class="popup-overlay" onclick="closeGallery()">
        <div class="bg-white rounded-[40px] w-full max-w-sm max-h-[85vh] overflow-y-auto p-6 shadow-2xl relative" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6 sticky top-0 bg-white/80 backdrop-blur pb-2 z-10">
                <h3 class="font-black text-xl text-brand-dark">JUNTY GALLERY</h3>
                <button onclick="closeGallery()" class="w-8 h-8 flex items-center justify-center bg-brand-light rounded-full"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="gallery-grid" class="grid grid-cols-2 gap-3">
                <div class="skeleton aspect-square rounded-2xl"></div>
                <div class="skeleton aspect-square rounded-2xl"></div>
                <div class="skeleton aspect-square rounded-2xl"></div>
                <div class="skeleton aspect-square rounded-2xl"></div>
            </div>
        </div>
    </div>

    <div class="app-container flex flex-col">
        <div id="page-home" class="page active">
            <div class="gradient-bg pt-12 px-6 pb-32 relative rounded-b-[60px] shadow-lg text-center">
                <div class="z-10 relative mb-4">
                    <h1 class="text-[26px] font-black text-white tracking-tight">JUNTY WE STUDIO</h1>
                </div>
                <div class="hero-image-placeholder mt-8 mb-[-110px] !shadow-logo bg-white p-1">
                    <div class="w-full h-full rounded-full overflow-hidden flex items-center justify-center">
                        <img src="IMG_4612.png" alt="Logo" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-t-[50px] -mt-16 relative z-10 pt-16 px-6 pb-8">
                <div class="space-y-4">
                    <div class="border-2 border-brand-light rounded-[35px] bg-brand-light/40 p-5 cursor-pointer hover:bg-brand-light/60 transition-all" onclick="openGallery()">
                        <div class="flex justify-between items-center mb-5">
                            <p class="text-sm font-black text-brand-text flex items-center gap-2">
                                <span class="w-1.5 h-5 bg-brand-main rounded-full"></span> ตัวอย่างงานล่าสุด
                            </p>
                            <span class="text-[10px] font-black text-white bg-brand-main px-4 py-2 rounded-xl">กดดูทั้งหมด</span>
                        </div>
                        <div id="preview-grid" class="grid grid-cols-3 gap-2">
                             <div class="skeleton aspect-[3/4] rounded-xl"></div>
                             <div class="skeleton aspect-[3/4] rounded-xl"></div>
                             <div class="skeleton aspect-[3/4] rounded-xl"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-2xl border-t border-brand-main/10 px-8 py-6 z-50 max-w-[430px] mx-auto rounded-t-[45px]">
            <div class="flex justify-between items-center text-brand-subtext">
                <div class="flex flex-col items-center gap-1.5 cursor-pointer text-brand-main" onclick="switchTab('page-home', 0)"><i class="fa-solid fa-house-chimney text-2xl"></i><span class="text-[10px] font-black">HOME</span></div>
            </div>
        </div>
    </div>

    <script>
        // เชื่อมต่อรหัส Sheet ID จากลิงก์ที่คุณส่งมา
        const SHEET_ID = '1-LtxVdM5z8cfAKDfn6Imk9tAy4vJs5RVdYMZ0zm8OUo'; 
        const SHEET_NAME = 'Sheet1'; 
        
        async function fetchGalleryImages() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                
                // ตรวจสอบข้อมูลและกรองลิงก์ที่ว่างออก
                const imageUrls = rows
                    .map(row => row.c && row.c[0] ? row.c[0].v : null)
                    .filter(url => url !== null && url !== "imageUrl"); // กรองหัวตารางออก
                
                renderGallery(imageUrls);
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function renderGallery(urls) {
            const grid = document.getElementById('gallery-grid');
            const preview = document.getElementById('preview-grid');
            
            grid.innerHTML = '';
            preview.innerHTML = '';

            if (urls.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-brand-subtext py-10">ยังไม่มีรูปภาพในขณะนี้</p>';
                preview.innerHTML = '<div class="col-span-3 text-center text-[10px] text-brand-subtext">รออัปเดตผลงาน</div>';
                return;
            }

            urls.forEach((url, index) => {
                // รูปใน Popup
                const img = document.createElement('img');
                img.src = url;
                img.className = "rounded-2xl w-full aspect-square object-cover shadow-sm hover:scale-95 transition-transform cursor-pointer";
                img.onclick = () => window.open(url, '_blank');
                grid.appendChild(img);

                // Preview 3 รูปแรกที่หน้า Home
                if(index < 3) {
                    const previewImg = document.createElement('img');
                    previewImg.src = url;
                    previewImg.className = "rounded-xl w-full aspect-[3/4] object-cover bg-white shadow-sm";
                    preview.appendChild(previewImg);
                }
            });
        }

        function openGallery() { document.getElementById('gallery-popup').style.display = 'flex'; }
        function closeGallery() { document.getElementById('gallery-popup').style.display = 'none'; }
        function switchTab(pageId, navIndex) { /* ฟังก์ชันสลับหน้า */ }

        window.onload = fetchGalleryImages;
    </script>
</body>
</html>
